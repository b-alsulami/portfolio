<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bandar Ahmed Alsulami</title>
 
<script src="https://cdn.tailwindcss.com"></script>
 
<style>

body {

  background: #060A14;

  color: #E2E8F0;

}
 
/* FIXED REVEAL SYSTEM */

.reveal {

  opacity: 0;

  transform: translateY(30px);

  transition: all 0.7s ease;

}
 
.reveal.visible {

  opacity: 1;

  transform: translateY(0);

}
 
/* FALLBACK (CRITICAL FIX) */

.no-js .reveal {

  opacity: 1 !important;

  transform: none !important;

}
 
/* Buttons */

.btn-primary {

  background: #C9A84C;

  color: #000;

  padding: 12px 20px;

  border-radius: 10px;

}
</style>
</head>
 
<body class="no-js">
 
<!-- HERO -->
<section class="min-h-screen flex flex-col justify-center items-center text-center px-6">
<h1 class="text-4xl text-white mb-4">Bandar Ahmed Alsulami</h1>
<p class="text-gray-400">Senior HR Professional</p>
</section>
 
<!-- ABOUT -->
<section class="px-6 py-20 max-w-lg mx-auto reveal">
<h2 class="text-2xl text-white mb-4">About</h2>
<p class="text-gray-400">

    Payroll & HR specialist with ERP experience and WPS compliance.
</p>
</section>
 
<!-- EXPERTISE -->
<section class="px-6 py-20 max-w-lg mx-auto reveal">
<h2 class="text-2xl text-white mb-6">Expertise</h2>
<ul class="text-gray-400 space-y-2">
<li>✔ Payroll Operations</li>
<li>✔ Compensation & Benefits</li>
<li>✔ HR Analytics</li>
</ul>
</section>
 
<!-- CAREER -->
<section class="px-6 py-20 max-w-lg mx-auto reveal">
<h2 class="text-2xl text-white mb-6">Career</h2>
<p class="text-gray-400">Senior Officer at Bin-Shihon Group</p>
</section>
 
<!-- CTA -->
<section class="px-6 py-20 text-center reveal">
<a href="cv.pdf" download class="btn-primary">

    Download CV
</a>
</section>
 
<script>

document.body.classList.remove("no-js");
 
/* SAFE OBSERVER */

function initObserver() {

  const elements = document.querySelectorAll('.reveal');
 
  if (!('IntersectionObserver' in window)) {

    elements.forEach(el => el.classList.add('visible'));

    return;

  }
 
  const observer = new IntersectionObserver((entries) => {

    entries.forEach(entry => {

      if (entry.isIntersecting) {

        entry.target.classList.add('visible');

      }

    });

  }, {

    threshold: 0.1

  });
 
  elements.forEach(el => observer.observe(el));

}
 
window.addEventListener('load', () => {

  initObserver();
 
  /* HARD FALLBACK (fixes GitHub Pages delay issues) */

  setTimeout(() => {

    document.querySelectorAll('.reveal').forEach(el => {

      el.classList.add('visible');

    });

  }, 800);

});
</script>
 
</body>
</html>
